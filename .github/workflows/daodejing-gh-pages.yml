# 部署到 GitHub Pages（仓库 Settings → Pages → Source: GitHub Actions）
# 前端项目位于仓库根目录；若将来改为 monorepo 子目录，请恢复 working-directory / paths 前缀。
name: Deploy daodejing to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'vite.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'eslint.config.*'
      - '.github/workflows/daodejing-gh-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages-daodejing'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Vite base for GitHub Pages
        id: base
        run: |
          NAME="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          NAME_LC=$(echo "$NAME" | tr '[:upper:]' '[:lower:]')
          OWNER_LC=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
          if [[ "$NAME_LC" == "${OWNER_LC}.github.io" ]]; then
            echo "path=/" >> "$GITHUB_OUTPUT"
          else
            echo "path=/${NAME}/" >> "$GITHUB_OUTPUT"
          fi

      - run: npm ci
      - run: npm run build
        env:
          VITE_BASE_PATH: ${{ steps.base.outputs.path }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
